services:
  apache:
    build: ./apache
    container_name: apache
    network_mode: host
    env_file:
      - .env
    environment:
      - DB_HOST=133.18.180.200
      - DB_PORT=3306
      - MYSQL_DATABASE=db_fxss
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./php/src:/var/www/html
      - ./logs/apache:/var/log/apache2
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
